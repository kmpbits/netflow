# .github/workflows/test.yml

name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    name: Run tests
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Run Android unit tests
        run: ./gradlew :netflow-core:testDebugUnitTest :netflow-paging:testDebugUnitTest
      - name: Run iOS simulator tests
        run: ./gradlew :netflow-core:iosSimulatorArm64Test :netflow-paging:iosSimulatorArm64Test
